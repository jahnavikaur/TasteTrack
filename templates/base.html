<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}KitchenMind AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1815;
      --surface2: #242220;
      --border: #2e2c29;
      --accent: #e8b86d;
      --accent2: #c97d3a;
      --accent-pale: rgba(232,184,109,0.12);
      --green: #7ec98a;
      --red: #e07070;
      --yellow: #e8c96d;
      --text: #f0ece4;
      --muted: #8a8070;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,14,12,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo span { font-size: 1.5rem; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--accent);
      background: var(--accent-pale);
    }

    /* LAYOUT */
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .page-header { margin-bottom: 2.5rem; }
    .page-header h1 { font-family: var(--font-display); font-size: 2.2rem; font-weight: 700; color: var(--text); }
    .page-header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px;
      font-family: var(--font-body); font-size: 0.9rem; font-weight: 500;
      border: none; cursor: pointer; text-decoration: none; transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: #1a1510; }
    .btn-primary:hover { background: #f0ca7d; transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: rgba(224,112,112,0.15); color: var(--red); border: 1px solid rgba(224,112,112,0.3); }
    .btn-danger:hover { background: rgba(224,112,112,0.25); }
    .btn-sm { padding: 6px 14px; font-size: 0.82rem; }

    /* FORMS */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
    input, select, textarea {
      width: 100%; padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--font-body); font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,184,109,0.15);
    }
    select option { background: var(--surface2); }

    /* BADGES */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.03em;
    }
    .badge-green { background: rgba(126,201,138,0.15); color: var(--green); }
    .badge-red { background: rgba(224,112,112,0.15); color: var(--red); }
    .badge-yellow { background: rgba(232,201,109,0.15); color: var(--yellow); }
    .badge-accent { background: var(--accent-pale); color: var(--accent); }

    /* GRID */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
      background: var(--surface2); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 1rem 1.5rem; border-radius: var(--radius);
      box-shadow: var(--shadow); display: none;
      font-size: 0.9rem; color: var(--text);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 14px; font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; border-bottom: 1px solid rgba(46,44,41,0.5); font-size: 0.92rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* DIVIDER */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    /* STAT CARD */
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 2.2rem; font-weight: 700; font-family: var(--font-display); color: var(--accent); }
    .stat-sub { font-size: 0.82rem; color: var(--muted); }

    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      nav { padding: 0 1rem; }
      .nav-links a { padding: 6px 10px; font-size: 0.82rem; }
      .container { padding: 1rem; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-logo"><span>🍳</span> KitchenMind AI</a>
    <div class="nav-links">
      <a href="/" class="{% if request.endpoint == 'index' %}active{% endif %}">Home</a>
      <a href="/pantry" class="{% if request.endpoint == 'pantry' %}active{% endif %}">Pantry</a>
      <a href="/recommend" class="{% if request.endpoint == 'recommend' %}active{% endif %}">Recipes</a>
      <a href="/weekly_plan" class="{% if request.endpoint == 'weekly_plan' %}active{% endif %}">Weekly Plan</a>
      <a href="/plan_history" class="{% if request.endpoint == 'plan_history' %}active{% endif %}">History</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg, duration=3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, duration);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
